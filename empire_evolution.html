<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>British Empire — Territorial Evolution</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #eee; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

#header {
  flex-shrink: 0;
  background: rgba(10,10,26,0.95); backdrop-filter: blur(8px);
  padding: 8px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex; justify-content: space-between; align-items: center;
}
#header h1 { font-size: 16px; font-weight: 600; }
.controls { display: flex; gap: 10px; align-items: center; font-size: 13px; }
.controls select, .controls input { background: #1a1a2e; color: #eee; border: 1px solid #333; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
.controls button { background: #2c3e50; color: #eee; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.controls button:hover { background: #3d566e; }
.controls button.active { background: #4a90d9; }

#panel-a {
  flex-shrink: 0; height: 220px; position: relative;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}
#area-chart { width: 100%; height: 100%; }
#area-tooltip {
  position: absolute; pointer-events: none; z-index: 50;
  background: rgba(20,20,40,0.95); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px; padding: 8px 12px; font-size: 12px;
  display: none; white-space: nowrap;
}

#panel-b { flex: 1; overflow: hidden; position: relative; }
#sankey-chart { width: 100%; height: 100%; cursor: grab; }
#sankey-chart:active { cursor: grabbing; }

#tooltip {
  position: fixed; pointer-events: none; z-index: 200;
  background: rgba(20,20,40,0.95); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px; padding: 10px 14px; font-size: 13px;
  max-width: 360px; display: none; backdrop-filter: blur(8px);
}
#tooltip .tt-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
#tooltip .tt-meta { color: #aaa; font-size: 12px; }
#tooltip .tt-edges { margin-top: 6px; font-size: 11px; color: #88ccff; }

#legend {
  position: fixed; bottom: 8px; left: 20px; z-index: 100;
  background: rgba(10,10,26,0.9); padding: 6px 14px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.1); font-size: 11px;
  display: flex; flex-wrap: wrap; gap: 2px 12px;
}
.legend-item { display: inline-flex; align-items: center; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; flex-shrink: 0; }

#info { position: fixed; bottom: 8px; right: 20px; z-index: 100; color: #555; font-size: 11px; }

/* Area chart */
.area-region { opacity: 0.8; cursor: pointer; transition: opacity 0.15s; }
.area-region:hover { opacity: 1; }
.area-region.dimmed { opacity: 0.2; }
.event-line-a { stroke: rgba(255,130,100,0.2); stroke-width: 1; stroke-dasharray: 4,3; }
.event-label-a { fill: rgba(255,130,100,0.5); font-size: 9px; }
.cursor-line { stroke: rgba(255,255,255,0.4); stroke-width: 1; pointer-events: none; }

/* Sankey bars and flows */
.node-bar { opacity: 0.85; cursor: pointer; transition: opacity 0.15s; }
.node-bar:hover { opacity: 1; filter: brightness(1.2); }
.node-bar.postimperial { opacity: 0.7; stroke-width: 2; stroke-dasharray: 4,2; }
.node-bar.nonbritish { opacity: 0.7; stroke-width: 2; stroke-dasharray: 6,3; }
.node-bar.standalone { opacity: 0.5; }
.node-bar.dim { opacity: 0.08; }
.node-bar.bright { opacity: 1; filter: brightness(1.2); }

.node-label { fill: #fff; font-size: 9px; pointer-events: none; transition: opacity 0.15s; text-shadow: 0 1px 2px rgba(0,0,0,0.7); }
.node-label.standalone { fill: #ddd; font-size: 7px; }
.node-label.dim { opacity: 0.06; }
.node-label.bright { fill: #fff; }

.flow { opacity: 0.25; transition: opacity 0.15s; }
.flow.dim { opacity: 0.03; }
.flow.bright { opacity: 0.7; }
.flow.gap-warning { stroke: #ff6644; stroke-width: 1; stroke-dasharray: 3,2; }

.timeline-line { stroke: rgba(255,255,255,0.05); stroke-width: 1; }
.timeline-label { fill: rgba(255,255,255,0.2); font-size: 11px; text-anchor: middle; }
.event-line { stroke: rgba(255,130,100,0.12); stroke-width: 1; stroke-dasharray: 6,4; }
.event-label { fill: rgba(255,130,100,0.35); font-size: 9px; }
</style>
</head>
<body>

<div id="header">
  <h1>The British Empire — Territorial Evolution</h1>
  <div class="controls">
    <label style="color:#999">Region:
      <select id="filter-region"><option value="all">All Regions</option></select>
    </label>
    <label style="color:#999">Search: <input type="text" id="search" placeholder="colony name..."></label>
    <button onclick="resetView()">Reset</button>
  </div>
</div>

<div id="panel-a">
  <svg id="area-chart"></svg>
  <div id="area-tooltip"></div>
</div>

<div id="panel-b">
  <svg id="sankey-chart"></svg>
</div>

<div id="tooltip"></div>
<div id="legend"></div>
<div id="info">Scroll to zoom · Drag to pan · Click a colony to highlight lineage · Click area chart to filter region</div>

<script>
// ── Configuration ──
const REGION_COLORS = {
  'Africa': '#e6a832', 'Asia': '#e05252', 'Pacific': '#52b5e0',
  'Caribbean': '#52e0a0', 'North America': '#b87be0',
  'Europe': '#e0c552', 'Antarctica': '#8ecae6', 'Atlantic': '#4ea8a8',
  'South America': '#2ecc71', 'Unknown': '#777',
  // Africa sub-regions (variants of Africa gold)
  'Southern Africa': '#e6a832', 'West Africa': '#d4943a',
  'East Africa': '#c98030', 'Africa (Islands)': '#d4b060',
  // Middle East (warm red-orange, between Africa gold and Asia red)
  'Middle East': '#d46a3a',
  // Asia sub-regions (variants of Asia red)
  'South Asia': '#e05252', 'Southeast Asia': '#c94040',
  // Pacific sub-region
  'Pacific (Guano/Whaling)': '#7ab8b0',
};
const REGION_ORDER = ['North America','Caribbean','Atlantic','South America','Europe',
  'Middle East','Southern Africa','West Africa','East Africa','Africa (Islands)',
  'Africa','South Asia','Southeast Asia','Asia',
  'Pacific','Pacific (Guano/Whaling)',
  'Antarctica','Unknown'];
const POST_IMPERIAL = new Set(['Dominion','Independence','Former Colony (Independent)','Federation','Transitional','Unilateral Independence']);
const NON_BRITISH = new Set(['Boer Republic','Dutch Company Colony','Dutch Colony','French Colony','Colonial Empire','Colonial Territory','Military Administration']);
const YEAR_MIN = 1580;
const YEAR_MAX = 1985;
const UNIT = 14;
const GAP = 3;
const EVENTS = [
  { year: 1776, label: 'American Independence' },
  { year: 1834, label: 'Slavery Abolition' },
  { year: 1857, label: 'Indian Rebellion' },
  { year: 1914, label: 'WWI' },
  { year: 1939, label: 'WWII' },
  { year: 1947, label: 'Indian Independence' },
  { year: 1960, label: 'Year of Africa' },
];

// ── State ──
let activeRegion = 'all';
let selectedNode = null;
let allNodes, allEdges, nodeById, childrenOf, parentsOf;

function init() {
  const RAW = EMBED_DATA;

  // Patch known data issues (fixes applied to Neo4j but not yet re-exported)
  const DATA_FIXES = {
    'united_colony_of_bc_1866_1871': { ind: 1871 },
    // Commonwealth of Australia: Dominion ended with Statute of Westminster Adoption Act 1942
    'commonwealth_of_australia_1901_ongoing': { ind: 1942 },
    // BC Mainland ind should be 1866 (merged with Vancouver Island), not 1871
    'mainland_british_columbia_1858_1866': { ind: 1866 },
    // Colony of Newfoundland became a Dominion in 1907
    'colony_of_newfoundland_1610_1949': { ind: 1907 },
    // New Hampshire: 1623 is a fishing village (Pannaway); Province granted 1629 by John Mason
    'new_hampshire_colony_1623_1783': { est: 1629 },
    'canada_french_1608_1763': { ind: 1763 },
    'settlement_of_belize_1798_1862': { ind: 1862, region: 'Caribbean' },
    'british_honduras_1862_1981': { region: 'Caribbean' },
    'antigua_montserrat_barbuda_1816_1833': { name: 'Antigua-Barbuda-Montserrat', est: 1816, ind: 1833, region: 'Caribbean' },
    'stkitts_nevis_anguilla_1816_1833': { name: 'St. Kitts-Nevis-Anguilla', est: 1816, ind: 1833, region: 'Caribbean' },
    'acadia_french_1604_1713': { ind: 1713 },
    'bermuda_1609_ongoing': { region: 'Atlantic' },
    'british_guiana_1831_1966': { region: 'South America' },
    // #1: Rename Canada, Dominion of → Dominion of Canada, end at 1931
    'canada_dominion_of_1867_ongoing': { name: 'Dominion of Canada', ind: 1931 },
    // Nova Scotia date fix handled by node split below
    // Caribbean fixes
    'leeward_islands_colony_1671_1816': { ind: 1816 },  // reorganized 1816, not 1956
    'federal_colony_leeward_islands_1833-1960': { type: 'Federal Colony', ind: 1960 },  // dissolved 1960
    'antigua_colony_1632_1981': { ind: 1981 },  // independence as Antigua and Barbuda
    'saint_christopher_nevis_anguilla_1958_1983': { est: 1624 },  // est was correct in data but confirm
    // Trinidad & Tobago: split into Trinidad Colony (1797-1888) + Colony of T&T (1889-1962)
    'trinidad_and_tobago_colony_1797_1962': { name: 'Trinidad Colony', ind: 1888 },
    'trinidad_and_tobago_1889_1962': { name: 'Colony of Trinidad and Tobago' },
    // Assam Province ended 1905 when merged into Eastern Bengal; restored version covers 1912-1947
    'assam_province_1874_1905': { ind: 1905 },
    // Lower Burma absorbed into Burma (British India) in 1886 after Third Anglo-Burmese War
    'lower_burma_1824_1886': { ind: 1886 },
    // Assam (Bengal Presidency) ended when separated as its own province
    'assam_bengal_presidency_1826_1874': { ind: 1874 },
    // Assam Province (Restored) ended at independence
    'assam_province_restored_1912_1947': { ind: 1947 },
    // Assam (Bengal Presidency) ended when separated as its own province
    'assam_bengal_presidency_1826_1874': { ind: 1874 },
    // Aden became a Crown Colony in 1937; the original Aden entity ended then
    'aden_1839_1963': { ind: 1937 },
    // Bencoolen ceded to Netherlands in 1824 (Anglo-Dutch Treaty)
    'bencoolen_bengkulu_1685_1824': { ind: 1824 },
    // Banda Islands returned to Netherlands in 1817
    'banda_islands_british_occupation_1810_1817': { ind: 1817 },
    // Forts end when their Presidencies are formally established
    'factory_at_surat_1612_1857': { ind: 1687 },  // EIC moved HQ to Bombay
    'fort_william_calcutta_1696_1857': { ind: 1757 },  // Battle of Plassey → Bengal Presidency
    // Nyasaland end date: joined Federation 1953; post-federation node handles 1963-1964
    'nyasaland_1891_1964': { ind: 1953 },
  };
  RAW.nodes.forEach(n => {
    const fix = DATA_FIXES[n.id];
    if (fix) Object.assign(n, fix);
    // Treat empty string ind as null
    if (n.ind === '') n.ind = null;
    // Merge "America" region into "North America"
    if (n.region === 'America') n.region = 'North America';
  });

  // Add new nodes not in the KG yet
  // (Nova Scotia Scottish Charter 1621-1632 removed — no effective colonial presence)
  // Acadia -> Nova Scotia (Treaty of Utrecht 1713)
  RAW.edges.push({
    source: 'acadia_french_1604_1713',
    target: 'nova_scotia_1621_1867',
    type: 'EVOLVED_INTO',
  });
  // Nova Scotia partition (1784): split into continuing NS + New Brunswick
  // Replace single Nova Scotia node with pre/post partition nodes
  const nsIdx = RAW.nodes.findIndex(n => n.id === 'nova_scotia_1621_1867');
  if (nsIdx >= 0) RAW.nodes.splice(nsIdx, 1);
  RAW.nodes.push(
    { id: 'nova_scotia_pre_1713_1784', name: 'Nova Scotia', est: 1713, ind: 1784,
      region: 'North America', type: 'Crown Colony', qid: 'Q98931415' },
    { id: 'nova_scotia_post_1784_1867', name: 'Nova Scotia', est: 1784, ind: 1867,
      region: 'North America', type: 'Crown Colony', qid: 'Q98931415' },
  );
  // Update edges that referenced old nova_scotia
  RAW.edges.forEach(e => {
    if (e.target === 'nova_scotia_1621_1867') e.target = 'nova_scotia_pre_1713_1784';
    if (e.source === 'nova_scotia_1621_1867') e.source = 'nova_scotia_post_1784_1867';
  });
  // Pre-NS splits into post-NS + New Brunswick
  RAW.edges.push(
    { source: 'nova_scotia_pre_1713_1784', target: 'nova_scotia_post_1784_1867', type: 'PARTITIONED_INTO' },
    { source: 'nova_scotia_pre_1713_1784', target: 'new_brunswick_1784_1867', type: 'PARTITIONED_INTO' },
    { source: 'nova_scotia_pre_1713_1784', target: 'cape_breton_colony_1784_1820', type: 'PARTITIONED_INTO' },
    { source: 'cape_breton_colony_1784_1820', target: 'nova_scotia_post_1784_1867', type: 'EVOLVED_INTO' },
    { source: 'nova_scotia_post_1784_1867', target: 'canada_dominion_of_1867_ongoing', type: 'EVOLVED_INTO' },
  );
  // Cape Breton Colony — separated from Nova Scotia 1784, remerged 1820
  RAW.nodes.push({
    id: 'cape_breton_colony_1784_1820', name: 'Cape Breton Colony', est: 1784, ind: 1820,
    region: 'North America', type: 'Crown Colony', qid: 'Q107457458',
  });

  // East Florida & West Florida — British 1763-1783 (Treaty of Paris to Treaty of Versailles)
  RAW.nodes.push(
    { id: 'east_florida_1763_1783', name: 'East Florida', est: 1763, ind: 1783,
      region: 'North America', type: 'Crown Colony', qid: 'Q1770351' },
    { id: 'west_florida_1763_1783', name: 'West Florida', est: 1763, ind: 1783,
      region: 'North America', type: 'Crown Colony', qid: 'Q4971241' },
  );

  // New France -> Province of Quebec (Treaty of Paris 1763)
  RAW.edges.push({
    source: 'new_france_1608_1763',
    target: 'province_of_quebec_british_1763_1791',
    type: 'EVOLVED_INTO',
  });
  // Île Royale (Cape Breton) -> Nova Scotia (Treaty of Paris 1763)
  RAW.edges.push({
    source: 'ile_royale_1713_1763',
    target: 'nova_scotia_pre_1713_1784',
    type: 'EVOLVED_INTO',
  });

  // Add Red River Colony (Selkirk Settlement) — carved from Rupert's Land, became Manitoba
  RAW.nodes.push({
    id: 'red_river_colony_1811_1870', name: "Red River Colony", est: 1811, ind: 1870,
    region: 'North America', type: 'Colony', qid: 'Q1143638',
  });

  // Australia — Dominion ended 1942 (Statute of Westminster Adoption Act), fully independent
  RAW.nodes.push({
    id: 'australia_independent_1942', name: 'Australia', est: 1942, ind: null,
    region: 'Pacific', type: 'Independence', qid: 'Q408',
  });
  RAW.edges.push({
    source: 'commonwealth_of_australia_1901_ongoing', target: 'australia_independent_1942', type: 'EVOLVED_INTO',
  });

  // New Zealand — split into Colony (1840-1907), Dominion (1907-1947), Independent (1947-)
  const nzIdx = RAW.nodes.findIndex(n => n.id === 'new_zealand_1840_1947');
  if (nzIdx >= 0) RAW.nodes.splice(nzIdx, 1);
  RAW.nodes.push(
    { id: 'new_zealand_colony_1840_1907', name: 'New Zealand Colony', est: 1840, ind: 1907,
      region: 'Pacific', type: 'Crown Colony', qid: 'Q664' },
    { id: 'dominion_of_new_zealand_1907_1947', name: 'Dominion of New Zealand', est: 1907, ind: 1947,
      region: 'Pacific', type: 'Dominion', qid: 'Q664' },
    { id: 'new_zealand_independent_1947', name: 'New Zealand', est: 1947, ind: null,
      region: 'Pacific', type: 'Independence', qid: 'Q664' },
  );
  // Redirect any edges that referenced old NZ node
  RAW.edges.forEach(e => {
    if (e.target === 'new_zealand_1840_1947') e.target = 'new_zealand_colony_1840_1907';
    if (e.source === 'new_zealand_1840_1947') e.source = 'dominion_of_new_zealand_1907_1947';
  });
  RAW.edges.push(
    { source: 'new_zealand_colony_1840_1907', target: 'dominion_of_new_zealand_1907_1947', type: 'EVOLVED_INTO' },
    { source: 'dominion_of_new_zealand_1907_1947', target: 'new_zealand_independent_1947', type: 'EVOLVED_INTO' },
  );

  // United States of America — 13 colonies all end 1783 (Treaty of Paris)
  RAW.nodes.push({
    id: 'united_states_1776', name: 'United States of America', est: 1776, ind: null,
    region: 'North America', type: 'Independence', qid: 'Q30',
  });
  const THIRTEEN_COLONIES = [
    'virginia_colony_1607_1783', 'massachusetts_bay_colony_1630_1783',
    'pennsylvania_colony_1681_1783', 'new_york_colony_1664_1783',
    'maryland_colony_1634_1783', 'connecticut_colony_1636_1783',
    'rhode_island_colony_1636_1783', 'delaware_colony_1664_1783',
    'new_hampshire_colony_1623_1783', 'new_jersey_colony_1664_1783',
    'north_carolina_colony_1663_1783', 'south_carolina_colony_1663_1783',
    'georgia_colony_1732_1783',
  ];
  THIRTEEN_COLONIES.forEach(id => {
    RAW.edges.push({ source: id, target: 'united_states_1776', type: 'EVOLVED_INTO' });
  });

  // #2: Add post-Statute Canada (1931-ongoing) as independent nation
  RAW.nodes.push({
    id: 'canada_independent_1931', name: 'Canada', est: 1931, ind: null,
    region: 'North America', type: 'Independence', qid: 'Q16',
  });
  RAW.edges.push({
    source: 'canada_dominion_of_1867_ongoing', target: 'canada_independent_1931', type: 'EVOLVED_INTO',
  });

  // #4: NW Territory originated from HBC/Rupert's Land administration
  RAW.edges.push({
    source: 'ruperts_land_1670_1870', target: 'north_western_territory_1670_1870', type: 'PARTITIONED_INTO',
  });

  // Rupert's Land splits: Red River Colony carved out, remainder + Red River + NW Territory all flow into Canada
  RAW.edges.push(
    { source: 'ruperts_land_1670_1870', target: 'red_river_colony_1811_1870', type: 'PARTITIONED_INTO' },
    { source: 'ruperts_land_1670_1870', target: 'canada_dominion_of_1867_ongoing', type: 'EVOLVED_INTO' },
    { source: 'red_river_colony_1811_1870', target: 'canada_dominion_of_1867_ongoing', type: 'EVOLVED_INTO' },
    { source: 'north_western_territory_1670_1870', target: 'canada_dominion_of_1867_ongoing', type: 'EVOLVED_INTO' },
  );

  // Newfoundland chain
  // Colony (1610-1907) → Dominion (1907-1934) → Commission of Government (1934-1949) → Canada (1949)
  RAW.nodes.push({
    id: 'newfoundland_commission_1934_1949', name: 'Newfoundland (Commission)', est: 1934, ind: 1949,
    region: 'North America', type: 'Crown Colony', qid: 'Q48378',
  });
  RAW.edges.push(
    { source: 'colony_of_newfoundland_1610_1949', target: 'dominion_of_newfoundland_1907_1934', type: 'EVOLVED_INTO' },
    { source: 'dominion_of_newfoundland_1907_1934', target: 'newfoundland_commission_1934_1949', type: 'EVOLVED_INTO' },
    { source: 'newfoundland_commission_1934_1949', target: 'canada_independent_1931', type: 'EVOLVED_INTO' },
  );

  // ── Africa fixes ──

  // Redirect edges that referenced removed Rhodesia envelope bars
  RAW.edges.forEach(e => {
    // northern_rhodesia_1911_1964 → northern_rhodesia_colony_1924_1953
    if (e.target === 'northern_rhodesia_1911_1964') e.target = 'northern_rhodesia_colony_1924_1953';
    if (e.source === 'northern_rhodesia_1911_1964') e.source = 'northern_rhodesia_colony_1924_1953';
    // southern_rhodesia_1901_1980 has no inbound edges, but redirect outbound just in case
    if (e.source === 'southern_rhodesia_1901_1980') e.source = 'southern_rhodesia_colony_1923_1953';
    if (e.target === 'southern_rhodesia_1901_1980') e.target = 'southern_rhodesia_colony_1923_1953';
    // Fix Assam cycle: Eastern Bengal → Assam (1874) is backwards; should point to Assam (Restored)
    if (e.source === 'eastern_bengal_and_assam_1905_1912' && e.target === 'assam_province_1874_1905')
      e.target = 'assam_province_restored_1912_1947';
    // Redirect edges that referenced removed duplicates
    if (e.target === 'uganda_protectorate_1894_1962') e.target = 'uganda_1894_1962';
    if (e.source === 'uganda_protectorate_1894_1962') e.source = 'uganda_1894_1962';
    if (e.target === 'somaliland_protectorate_1884_1960') e.target = 'british_somaliland_1884_1960';
    if (e.source === 'somaliland_protectorate_1884_1960') e.source = 'british_somaliland_1884_1960';
    if (e.target === 'anglo_egyptian_sudan_1899_1956') e.target = 'sudan_anglo-egyptian_1899_1956';
    if (e.source === 'anglo_egyptian_sudan_1899_1956') e.source = 'sudan_anglo-egyptian_1899_1956';
  });

  // Remove wrong Cape Colony edges — Cape didn't "become" or "partition into" these entities
  // Natalia Republic: Boer republic, annexed by Britain (not a Cape partition)
  // ORS: proclaimed by Cape governor but over territory NORTH of the Orange River — not Cape territory
  RAW.edges = RAW.edges.filter(e =>
    !(e.source === 'cape_colony_british_1806_1910' && e.target === 'natalia_republic_1839_1843') &&
    !(e.source === 'cape_colony_british_1806_1910' && e.target === 'orange_river_sovereignty_1848_1854')
  );

  // Leeward Islands Colony (1671-1816) split into two sub-groupings (Pattern E: Partition)
  RAW.edges.forEach(e => {
    if (e.source === 'leeward_islands_colony_1671_1816' &&
        (e.target === 'antigua_montserrat_barbuda_1816_1833' || e.target === 'stkitts_nevis_anguilla_1816_1833'))
      e.type = 'PARTITIONED_INTO';
  });

  // BSAC Territory was SPLIT between Southern and Northern Rhodesia (Pattern E: Partition)
  RAW.edges.forEach(e => {
    if (e.source === 'british_south_africa_company_territory_1889_1923' &&
        (e.target === 'southern_rhodesia_colony_1923_1953' || e.target === 'northern_rhodesia_colony_1924_1953'))
      e.type = 'PARTITIONED_INTO';
  });

// ── Panel A: Stacked Area ──
function buildAreaChart() {
  const container = document.getElementById('panel-a');
  const width = container.clientWidth;
  const height = container.clientHeight;
  const margin = { top: 15, right: 30, bottom: 22, left: 45 };

  const svg = d3.select('#area-chart').attr('width', width).attr('height', height);
  svg.selectAll('*').remove();

  const regions = REGION_ORDER.filter(r => allNodes.some(n => n.region === r));

  // Compute active counts per year per region
  const years = d3.range(YEAR_MIN, YEAR_MAX + 1);
  const stackData = years.map(y => {
    const row = { year: y };
    regions.forEach(r => { row[r] = 0; });
    allNodes.forEach(n => {
      const est = n.est || YEAR_MIN;
      const ind = n.ind || YEAR_MAX;
      if (y >= est && y <= ind && regions.includes(n.region)) {
        row[n.region]++;
      }
    });
    return row;
  });

  const x = d3.scaleLinear().domain([YEAR_MIN, YEAR_MAX]).range([margin.left, width - margin.right]);
  const stack = d3.stack().keys(regions);
  const series = stack(stackData);
  const yMax = d3.max(series, s => d3.max(s, d => d[1]));
  const y = d3.scaleLinear().domain([0, yMax]).range([height - margin.bottom, margin.top]);

  const area = d3.area()
    .x(d => x(d.data.year))
    .y0(d => y(d[0]))
    .y1(d => y(d[1]))
    .curve(d3.curveMonotoneX);

  // Event lines
  EVENTS.forEach(ev => {
    svg.append('line').attr('class', 'event-line-a')
      .attr('x1', x(ev.year)).attr('x2', x(ev.year))
      .attr('y1', margin.top).attr('y2', height - margin.bottom);
    svg.append('text').attr('class', 'event-label-a')
      .attr('x', x(ev.year) + 2).attr('y', margin.top + 8)
      .attr('transform', `rotate(-35, ${x(ev.year) + 2}, ${margin.top + 8})`)
      .text(ev.label);
  });

  // Areas
  series.forEach(s => {
    svg.append('path')
      .attr('class', 'area-region')
      .attr('d', area(s))
      .attr('fill', REGION_COLORS[s.key])
      .attr('data-region', s.key)
      .on('click', () => setRegion(s.key === activeRegion ? 'all' : s.key));
  });

  // Axes
  svg.append('g')
    .attr('transform', `translate(0,${height - margin.bottom})`)
    .call(d3.axisBottom(x).tickFormat(d3.format('d')).ticks(15))
    .selectAll('text').attr('fill', '#666').attr('font-size', '10px');
  svg.append('g')
    .attr('transform', `translate(${margin.left},0)`)
    .call(d3.axisLeft(y).ticks(5))
    .selectAll('text').attr('fill', '#666').attr('font-size', '10px');
  svg.selectAll('.domain, .tick line').attr('stroke', '#333');

  // Y-axis label
  svg.append('text').attr('fill', '#666').attr('font-size', '10px')
    .attr('transform', `rotate(-90)`).attr('x', -(height/2)).attr('y', 12)
    .attr('text-anchor', 'middle').text('Active Territories');

  // Cursor + tooltip
  const cursorLine = svg.append('line').attr('class', 'cursor-line')
    .attr('y1', margin.top).attr('y2', height - margin.bottom).attr('display', 'none');

  const tooltip = document.getElementById('area-tooltip');

  svg.append('rect')
    .attr('x', margin.left).attr('y', margin.top)
    .attr('width', width - margin.left - margin.right)
    .attr('height', height - margin.top - margin.bottom)
    .attr('fill', 'transparent')
    .on('mousemove', function(event) {
      const [mx] = d3.pointer(event);
      const yr = Math.round(x.invert(mx));
      if (yr < YEAR_MIN || yr > YEAR_MAX) return;
      cursorLine.attr('x1', x(yr)).attr('x2', x(yr)).attr('display', null);
      const row = stackData.find(d => d.year === yr);
      if (!row) return;
      const total = regions.reduce((s, r) => s + row[r], 0);
      let html = `<strong>${yr}</strong> — ${total} territories<br>`;
      regions.forEach(r => {
        if (row[r] > 0) {
          html += `<span style="color:${REGION_COLORS[r]}">■</span> ${r}: ${row[r]}<br>`;
        }
      });
      tooltip.innerHTML = html;
      tooltip.style.display = 'block';
      tooltip.style.left = Math.min(event.offsetX + 15, width - 200) + 'px';
      tooltip.style.top = '30px';
    })
    .on('mouseleave', () => {
      cursorLine.attr('display', 'none');
      tooltip.style.display = 'none';
    });
}

function setRegion(region) {
  activeRegion = region;
  document.getElementById('filter-region').value = region;
  selectedNode = null;

  // Highlight area chart
  d3.selectAll('.area-region').classed('dimmed', region !== 'all')
    .filter(function() { return d3.select(this).attr('data-region') === region; })
    .classed('dimmed', false);

  buildSankey();
}

// ── Panel B: Alluvial/Sankey ──
function buildSankey() {
  const container = document.getElementById('panel-b');
  const width = Math.max(container.clientWidth, 1400);
  const svgEl = d3.select('#sankey-chart');
  svgEl.selectAll('*').remove();
  svgEl.attr('width', width).attr('height', container.clientHeight);

  // Filter nodes by region
  const regionNodes = activeRegion === 'all' ? allNodes.slice() :
    allNodes.filter(n => n.region === activeRegion);

  if (regionNodes.length === 0) return;

  const regionIds = new Set(regionNodes.map(n => n.id));
  const regionEdges = allEdges.filter(e => regionIds.has(e.source) && regionIds.has(e.target));

  // Separate connected vs standalone
  const connected = new Set();
  regionEdges.forEach(e => { connected.add(e.source); connected.add(e.target); });

  const connectedNodes = regionNodes.filter(n => connected.has(n.id));
  const standaloneNodes = regionNodes.filter(n => !connected.has(n.id));

  // Build local adjacency
  const localChildren = {};
  const localParents = {};
  regionEdges.forEach(e => {
    (localChildren[e.source] = localChildren[e.source] || []).push(e.target);
    (localParents[e.target] = localParents[e.target] || []).push(e.source);
  });

  // Find connected components
  const visited = new Set();
  const components = [];
  function dfs(id, comp) {
    if (visited.has(id)) return;
    visited.add(id);
    comp.push(id);
    (localChildren[id] || []).forEach(c => dfs(c, comp));
    (localParents[id] || []).forEach(p => dfs(p, comp));
  }
  connectedNodes.forEach(n => {
    if (!visited.has(n.id)) {
      const comp = [];
      dfs(n.id, comp);
      components.push(comp);
    }
  });

  // Sort components by earliest est date
  components.sort((a, b) => {
    const ea = Math.min(...a.map(id => nodeById[id].est || 9999));
    const eb = Math.min(...b.map(id => nodeById[id].est || 9999));
    return ea - eb;
  });

  // Topological sort within each component
  function topoSort(nodeIds) {
    const inDeg = {};
    nodeIds.forEach(id => { inDeg[id] = 0; });
    nodeIds.forEach(id => {
      (localChildren[id] || []).forEach(c => {
        if (inDeg[c] !== undefined) inDeg[c]++;
      });
    });
    const queue = nodeIds.filter(id => inDeg[id] === 0).sort((a, b) => (nodeById[a].est || 0) - (nodeById[b].est || 0));
    const result = [];
    while (queue.length > 0) {
      const id = queue.shift();
      result.push(id);
      (localChildren[id] || []).forEach(c => {
        if (inDeg[c] !== undefined) {
          inDeg[c]--;
          if (inDeg[c] === 0) queue.push(c);
        }
      });
    }
    // Add any remaining (cycles)
    nodeIds.forEach(id => { if (!result.includes(id)) result.push(id); });
    return result;
  }

  // Layout: assign y positions
  const MARGIN = { top: 50, right: 60, bottom: 40, left: 60 };
  const xScale = d3.scaleLinear().domain([YEAR_MIN, YEAR_MAX]).range([MARGIN.left, width - MARGIN.right]);

  // For connected nodes: topological layout with weight-based heights
  // Compute weight (number of leaf ancestors) for each node
  const weights = {};
  function getWeight(id) {
    if (weights[id] !== undefined) return weights[id];
    const parents = localParents[id] || [];
    if (parents.length === 0) { weights[id] = 1; return 1; }
    let w = 0;
    parents.forEach(p => { w += getWeight(p); });
    weights[id] = Math.max(w, 1);
    return weights[id];
  }

  const layout = {};
  let yPos = MARGIN.top;

  // Layout connected components
  // Weight = max(ancestor leaf count, descendant leaf count) so both merges AND splits get space
  components.forEach((comp, ci) => {
    const sorted = topoSort(comp);

    // Ancestor weight: how many source-leaves feed into this node
    const aWeight = {};
    const aVisiting = new Set(); // cycle guard
    function getAWeight(id) {
      if (aWeight[id] !== undefined) return aWeight[id];
      if (aVisiting.has(id)) return 1; // break cycle
      aVisiting.add(id);
      const parents = (localParents[id] || []).filter(p => comp.includes(p));
      if (parents.length === 0) { aWeight[id] = 1; aVisiting.delete(id); return 1; }
      let w = 0;
      parents.forEach(p => { w += getAWeight(p); });
      aWeight[id] = Math.max(w, 1);
      aVisiting.delete(id);
      return aWeight[id];
    }
    // Descendant weight: how many sink-leaves this node fans out to
    const dWeight = {};
    const dVisiting = new Set(); // cycle guard
    function getDWeight(id) {
      if (dWeight[id] !== undefined) return dWeight[id];
      if (dVisiting.has(id)) return 1; // break cycle
      dVisiting.add(id);
      const children = (localChildren[id] || []).filter(c => comp.includes(c));
      if (children.length === 0) { dWeight[id] = 1; dVisiting.delete(id); return 1; }
      let w = 0;
      children.forEach(c => { w += getDWeight(c); });
      dWeight[id] = Math.max(w, 1);
      dVisiting.delete(id);
      return dWeight[id];
    }
    sorted.forEach(id => { getAWeight(id); getDWeight(id); });

    // === DFS lineage layout ===
    // Each node gets its own row (UNIT height). DFS from sources ensures
    // parent → child lineages are on adjacent rows for visual continuity.
    // Merge nodes (multiple parents) are deferred until all parents are placed.

    const sources = sorted.filter(id => !(localParents[id] && localParents[id].length > 0));

    // Order sources: DFS from sinks traces back to discover source order
    const sinks = sorted.filter(id => !(localChildren[id] && localChildren[id].length > 0));
    const sourceOrder = [];
    const sourceSeen = new Set();
    const collectVisited = new Set();
    function collectSources(id) {
      if (collectVisited.has(id)) return;
      collectVisited.add(id);
      const parents = (localParents[id] || []).filter(p => comp.includes(p));
      parents.sort((a, b) => (dWeight[a] || 1) - (dWeight[b] || 1) || (nodeById[b].est || 0) - (nodeById[a].est || 0));
      parents.forEach(pid => collectSources(pid));
      if (!(localParents[id] && localParents[id].length > 0) && !sourceSeen.has(id)) {
        sourceSeen.add(id);
        sourceOrder.push(id);
      }
    }
    sinks.forEach(s => collectSources(s));
    sources.forEach(id => { if (!sourceSeen.has(id)) sourceOrder.push(id); });

    // DFS layout: place a node and then immediately follow its lineage.
    // Merge nodes (multiple parents) wait until all parents are placed.
    const placed = new Set();
    function layoutNode(id) {
      if (placed.has(id)) return;
      // Check all parents in component are placed (topo constraint)
      const parents = (localParents[id] || []).filter(p => comp.includes(p));
      if (parents.some(p => !placed.has(p))) return; // defer
      placed.add(id);
      layout[id] = { y: yPos, h: UNIT };
      yPos += UNIT + GAP;
      // Immediately follow children, sorted by est date
      const children = (localChildren[id] || []).filter(c => comp.includes(c));
      children.sort((a, b) => (nodeById[a].est || 0) - (nodeById[b].est || 0));
      children.forEach(c => layoutNode(c));
    }
    sourceOrder.forEach(id => layoutNode(id));
    // Catch any remaining nodes not reached by DFS
    sorted.forEach(id => { if (!placed.has(id)) layoutNode(id); });

    if (ci < components.length - 1) yPos += GAP * 3;
  });

  // Standalone separator
  if (standaloneNodes.length > 0 && connectedNodes.length > 0) {
    yPos += GAP * 4;
  }

  // Layout standalone nodes
  standaloneNodes.sort((a, b) => (a.est || 0) - (b.est || 0));
  standaloneNodes.forEach(n => {
    layout[n.id] = { y: yPos, h: UNIT - 4 };
    yPos += (UNIT - 4) + GAP;
  });

  const totalHeight = yPos + MARGIN.bottom;

  // Create drawing groups
  const g = svgEl.append('g');
  const zoom = d3.zoom().scaleExtent([0.15, 8])
    .on('zoom', event => g.attr('transform', event.transform));
  svgEl.call(zoom);

  // Grid lines
  d3.range(1600, YEAR_MAX, 10).forEach(d => {
    g.append('line').attr('class', 'timeline-line')
      .attr('x1', xScale(d)).attr('x2', xScale(d))
      .attr('y1', MARGIN.top - 20).attr('y2', totalHeight);

  d3.range(1600, 2100, 100).forEach(c => {
    g.append('text').attr('class', 'timeline-label')
      .attr('x', xScale(c)).attr('y', MARGIN.top - 25).text(c);
  });

  // Event lines
  EVENTS.forEach(ev => {
    g.append('line').attr('class', 'event-line')
      .attr('x1', xScale(ev.year)).attr('x2', xScale(ev.year))
      .attr('y1', MARGIN.top - 15).attr('y2', totalHeight);
    g.append('text').attr('class', 'event-label')
      .attr('x', xScale(ev.year) + 3).attr('y', MARGIN.top - 5).text(ev.label);
  });

  // Component color variation
  const compColorMap = {};
  components.forEach((comp, ci) => {
    const baseRegion = nodeById[comp[0]] ? nodeById[comp[0]].region : 'Unknown';
    const baseColor = d3.color(REGION_COLORS[baseRegion] || '#777');
    const shift = (ci % 5) * 15 - 30;
    const varied = baseColor.brighter(shift / 60);
    comp.forEach(id => { compColorMap[id] = varied.formatHex(); });

  // French/pre-British colonial nodes get a distinct color
  // Pre-British colonial nodes get distinct colors
  const FRENCH_IDS = new Set([
    'acadia_french_1604_1713', 'new_france_1608_1763', 'canada_french_1608_1763',

    'cape_colony_dutch_1652_1795', 'cape_colony_dutch_restored_1803_1806',

  const INDIA_OFFICE_TYPES = new Set([
    'Trading Company', 'Trading Post', 'Presidency', 'Province', 'Province of British India',
  ]);
  const FRENCH_COLOR = '#3a8fd4'; // blue — Bourbon France
  const SCOTTISH_COLOR = '#2e86ab'; // teal-blue — Scottish charter
  const DUTCH_COLOR = '#e87d2f'; // orange — VOC / Dutch Republic
  const INDIA_OFFICE_COLOR = '#cc3333'; // deeper red — India Office
  const COLONIAL_OFFICE_SA_COLOR = '#e88080'; // lighter red — Colonial Office territories in South Asia

  function getColor(id) {
    if (FRENCH_IDS.has(id)) return FRENCH_COLOR;
    if (DUTCH_IDS.has(id)) return DUTCH_COLOR;
    // nova_scotia_scottish_1621_1632 removed
    if (compColorMap[id]) return compColorMap[id];
    const n = nodeById[id];
    if (!n) return '#777';
    // South Asia: distinguish India Office vs Colonial Office
    if (n.region === 'South Asia') {
      return INDIA_OFFICE_TYPES.has(n.type) ? INDIA_OFFICE_COLOR : COLONIAL_OFFICE_SA_COLOR;
    }
    return REGION_COLORS[n.region] || '#777';
  }

  // ── Draw flows ──
  const flowGroup = g.append('g');
  const flowElements = [];
  const fallbackSlots = {};
  regionNodes.forEach(n => { fallbackSlots[n.id] = 0; });

  // Sort edges by source y position
  const sortedEdges = regionEdges.slice().sort((a, b) =>
    ((layout[a.source] || {}).y || 0) - ((layout[b.source] || {}).y || 0)
  );

  // Track source-side slot usage for partitions (multiple children from same source)
  const srcSlots = {};
  regionNodes.forEach(n => { srcSlots[n.id] = 0; });

  sortedEdges.forEach(e => {
    const src = layout[e.source];
    const tgt = layout[e.target];
    if (!src || !tgt) return;

    const srcNode = nodeById[e.source];
    const tgtNode = nodeById[e.target];
    const isPartition = e.type === 'PARTITIONED_INTO';

    // Band height: divide source height among outbound flows
    const srcOutEdges = sortedEdges.filter(oe => oe.source === e.source);
    const outCount = Math.max(srcOutEdges.length, 1);
    const bandH = Math.max(Math.floor(src.h / outCount), 2);

    // Slot within target
    let slotY = tgt.y + fallbackSlots[e.target];
    fallbackSlots[e.target] += bandH;

    // Source-side Y: for partitions, stack bands within the source bar
    let srcY = src.y + (srcSlots[e.source] || 0);
    srcSlots[e.source] = (srcSlots[e.source] || 0) + bandH;

    // X connection points:
    const srcEnd = srcNode.ind || YEAR_MAX;
    const tgtStart = tgtNode.est || YEAR_MIN;
    // For partitions where target starts before source ends, connect at target's est date
    // For absorptions (target started before source ended), connect at source's end on both sides
    const isAbsorption = !isPartition && tgtStart < srcEnd;
    const x1 = isPartition && tgtStart < srcEnd

    const cpOffset = Math.max(Math.abs(x2 - x1) * 0.45, 15);

    const hasGap = !isPartition && !isAbsorption && Math.abs(tgtStart - srcEnd) > 2;

    const path = `
      M ${x1},${srcY}
      C ${x1 + cpOffset},${srcY} ${x2 - cpOffset},${slotY} ${x2},${slotY}
      L ${x2},${slotY + bandH}
      C ${x2 - cpOffset},${slotY + bandH} ${x1 + cpOffset},${srcY + bandH} ${x1},${srcY + bandH}

      .attr('class', 'flow' + (hasGap ? ' gap-warning' : ''))

      .attr('data-target', e.target);

        // Try abbreviations for common words

          [/\bProvince of\b/g, 'Prov.'],
          [/\bColony of\b/g, 'Col.'],
          [/\bDominion of\b/g, 'Dom.'],

          [/\b\(Mainland\)\b/g, '(Mnld)'],

        let txt = displayName;
        textEl.text(txt);
        for (const [re, rep] of abbrevs) {
          if (!this.getComputedTextLength || this.getComputedTextLength() <= maxW) break;
          txt = txt.replace(re, rep);
          textEl.text(txt);
        }
        // Still too long? Truncate with ellipsis
        while (this.getComputedTextLength && this.getComputedTextLength() > maxW && txt.length > 3) {
          txt = txt.slice(0, -2);
          textEl.text(txt + '\u2026');

  // ── Lineage functions ──
  function getLineage(id) {
    const related = new Set();
    function up(nid) { if (related.has(nid)) return; related.add(nid); (parentsOf[nid] || []).forEach(up); }
    function down(nid) { if (related.has(nid)) return; related.add(nid); (childrenOf[nid] || []).forEach(down); }
    up(id); down(id);
    return related;
  }

  window._highlightLineage = function(id) {
    const related = getLineage(id);

    d3.selectAll('.node-bar').classed('dim', true).classed('bright', false);
    d3.selectAll('.node-label').classed('dim', true).classed('bright', false);
    d3.selectAll('.flow').classed('dim', true).classed('bright', false);

    related.forEach(rid => {
      d3.selectAll(`.node-bar[data-id="${rid}"]`).classed('dim', false).classed('bright', true);
      d3.selectAll(`.node-label[data-id="${rid}"]`).classed('dim', false).classed('bright', true);
    });

    flowElements.forEach(f => {
      if (related.has(f.source) && related.has(f.target)) {
        f.el.classed('dim', false).classed('bright', true);
      }
    });
  };

  window._clearHighlight = function() {
    d3.selectAll('.node-bar').classed('dim', false).classed('bright', false);
    d3.selectAll('.node-label').classed('dim', false).classed('bright', false);
    d3.selectAll('.flow').classed('dim', false).classed('bright', false);
  };

  window._applyHighlight = function(matchIds) {
    d3.selectAll('.node-bar').classed('dim', true).classed('bright', false);
    d3.selectAll('.node-label').classed('dim', true).classed('bright', false);
    d3.selectAll('.flow').classed('dim', true).classed('bright', false);

    matchIds.forEach(id => {
      d3.selectAll(`.node-bar[data-id="${id}"]`).classed('dim', false).classed('bright', true);
      d3.selectAll(`.node-label[data-id="${id}"]`).classed('dim', false).classed('bright', true);
    });
  };

  // Fit to view
  const scaleX = (container.clientWidth - 40) / (xScale(YEAR_MAX) - xScale(YEAR_MIN) + MARGIN.left + MARGIN.right);
  const scaleY = (container.clientHeight - 40) / totalHeight;
  const initialScale = Math.min(scaleX, scaleY, 0.85);
  svgEl.call(zoom.transform, d3.zoomIdentity.scale(initialScale).translate(20, 20));

  window._sankeyZoom = zoom;
  window._sankeySvg = svgEl;
  window._sankeyInitialScale = initialScale;
}

// ── Tooltip ──
function showTooltip(event, n) {
  const tt = document.getElementById('tooltip');
  const est = n.est || '?';
  const ind = n.ind || 'ongoing';

  // Find edges with type info
  // Build edge type lookup
  const inEdges = allEdges.filter(e => e.target === n.id && nodeById[e.source]);
  const outEdges = allEdges.filter(e => e.source === n.id && nodeById[e.target]);

  let edgeHtml = '';
  if (inEdges.length > 0) {
    const evolved = inEdges.filter(e => e.type !== 'PARTITIONED_INTO').map(e => nodeById[e.source].name);
    const partFrom = inEdges.filter(e => e.type === 'PARTITIONED_INTO').map(e => nodeById[e.source].name);
    if (evolved.length > 0) edgeHtml += `<div class="tt-edges">From: ${evolved.join(', ')}</div>`;
    if (partFrom.length > 0) edgeHtml += `<div class="tt-edges">Partitioned from: ${partFrom.join(', ')}</div>`;
  }
  if (outEdges.length > 0) {
    const evolvedTo = outEdges.filter(e => e.type !== 'PARTITIONED_INTO').map(e => nodeById[e.target].name);
    const partInto = outEdges.filter(e => e.type === 'PARTITIONED_INTO').map(e => nodeById[e.target].name);
    if (evolvedTo.length > 0) edgeHtml += `<div class="tt-edges">Became: ${evolvedTo.join(', ')}</div>`;
    if (partInto.length > 0) edgeHtml += `<div class="tt-edges">Partitioned into: ${partInto.join(', ')}</div>`;
  }

  const qidLink = n.qid ? `<a href="https://www.wikidata.org/wiki/${n.qid}" style="color:#88ccff" target="_blank">${n.qid}</a>` : '';

  tt.innerHTML = `
    <div class="tt-name">${n.name}</div>
    <div class="tt-meta">${est} – ${ind} · ${n.type || 'Unknown type'} · ${n.region}</div>
    ${qidLink ? `<div class="tt-meta">${qidLink}</div>` : ''}
    ${edgeHtml}
  `;
  tt.style.display = 'block';
  tt.style.left = Math.min(event.clientX + 15, window.innerWidth - 380) + 'px';
  tt.style.top = (event.clientY - 10) + 'px';
}

function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }
