<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colony QID Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f5f5f5; color: #333; }

  .header { background: #1a1a2e; color: white; padding: 16px 24px; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 20px; margin-bottom: 8px; }
  .stats { display: flex; gap: 16px; font-size: 14px; flex-wrap: wrap; }
  .stat { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 4px; }
  .stat.pending { background: #e67e22; }
  .stat.done { background: #27ae60; }

  .filters { background: #fff; padding: 12px 24px; border-bottom: 1px solid #ddd; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; position: sticky; top: 72px; z-index: 99; }
  .filters select, .filters input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
  .filters label { font-size: 13px; color: #666; }

  .container { max-width: 1200px; margin: 0 auto; padding: 16px; }

  .card { background: white; border-radius: 8px; margin-bottom: 12px; border-left: 5px solid #ccc; overflow: hidden; }
  .card.verdict-confirmed { border-left-color: #3498db; }
  .card.verdict-wrong { border-left-color: #e74c3c; }
  .card.verdict-uncertain { border-left-color: #f39c12; }
  .card.verdict-no_match_found { border-left-color: #95a5a6; }
  .card.verdict-already_verified { border-left-color: #27ae60; }
  .card.decision-accept { border-left-color: #27ae60; opacity: 0.7; }
  .card.decision-reject { border-left-color: #c0392b; background: #fdf2f2; }
  .card.decision-accept .card-body { max-height: 0; overflow: hidden; padding: 0 20px; }

  .card-header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .card-header:hover { background: #f9f9f9; }
  .colony-name { font-weight: 600; font-size: 16px; }
  .colony-meta { font-size: 13px; color: #666; }
  .verdict-badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
  .verdict-badge.confirmed { background: #ebf5fb; color: #2980b9; }
  .verdict-badge.wrong { background: #fdedec; color: #c0392b; }
  .verdict-badge.uncertain { background: #fef5e7; color: #d68910; }
  .verdict-badge.no_match_found { background: #eaecee; color: #7f8c8d; }
  .verdict-badge.already_verified { background: #eafaf1; color: #27ae60; }

  .card-body { padding: 12px 20px 16px; border-top: 1px solid #eee; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; margin-bottom: 12px; }
  .detail-label { font-size: 11px; text-transform: uppercase; color: #999; letter-spacing: 0.5px; }
  .detail-value { font-size: 14px; }
  .detail-value a { color: #2980b9; text-decoration: none; }
  .detail-value a:hover { text-decoration: underline; }
  .qid-change { background: #fef9e7; padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; font-size: 13px; }
  .qid-change .old { text-decoration: line-through; color: #e74c3c; }
  .qid-change .new { color: #27ae60; font-weight: 600; }
  .qid-change .arrow { color: #999; margin: 0 6px; }
  .notes { font-size: 13px; color: #555; background: #f8f9fa; padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; }
  .wd-desc { font-size: 14px; color: #333; margin-bottom: 8px; }

  .actions { display: flex; gap: 8px; }
  .btn { padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-accept { background: #27ae60; color: white; }
  .btn-accept:hover { background: #219a52; }
  .btn-reject { background: #e74c3c; color: white; }
  .btn-reject:hover { background: #c0392b; }
  .btn-reset { background: #bdc3c7; color: #333; }
  .btn-reset:hover { background: #a6acaf; }
  .btn-export { background: #2c3e50; color: white; padding: 8px 20px; font-size: 14px; }
  .btn-export:hover { background: #1a252f; }

  .export-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #2c3e50; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; color: white; z-index: 100; }
  .export-bar .progress { font-size: 14px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <h1>Colony Wikidata QID Review</h1>
  <div class="stats">
    <div class="stat" id="stat-total">Total: 0</div>
    <div class="stat" id="stat-showing">Showing: 0</div>
    <div class="stat pending" id="stat-pending">Pending: 0</div>
    <div class="stat done" id="stat-accepted">Accepted: 0</div>
    <div class="stat" id="stat-rejected" style="background:#c0392b">Rejected: 0</div>
  </div>
</div>

<div class="filters">
  <label>Show:
    <select id="filter-verdict">
      <option value="needs_review">Needs Review (confirmed + wrong + uncertain)</option>
      <option value="wrong">Wrong (corrected QIDs only)</option>
      <option value="confirmed">Confirmed only</option>
      <option value="uncertain">Uncertain only</option>
      <option value="no_match_found">No match found</option>
      <option value="already_verified">Already verified</option>
      <option value="all">All</option>
    </select>
  </label>
  <label>Region:
    <select id="filter-region">
      <option value="all">All regions</option>
    </select>
  </label>
  <label>Decision:
    <select id="filter-decision">
      <option value="all">All decisions</option>
      <option value="pending">Pending</option>
      <option value="accept">Accepted</option>
      <option value="reject">Rejected</option>
    </select>
  </label>
  <label>Search:
    <input type="text" id="filter-search" placeholder="colony name...">
  </label>
</div>

<div class="container" id="cards"></div>

<div class="export-bar">
  <div class="progress" id="progress-text">Review progress: 0 / 0</div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-export" onclick="acceptAllVisible()">Accept All Visible</button>
    <button class="btn btn-export" onclick="exportResults()">Export JSON</button>
  </div>
</div>

<script>
let data = [];
let decisions = {}; // colony_id -> "accept" | "reject"

async function loadData() {
  // Data is embedded below by the build script
  data = REVIEW_DATA;

  // Load saved decisions from localStorage
  const saved = localStorage.getItem('colony_qid_decisions');
  if (saved) decisions = JSON.parse(saved);

  // Populate region filter
  const regions = [...new Set(data.map(d => d.region || 'Unknown'))].sort();
  const regionSelect = document.getElementById('filter-region');
  regions.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r;
    opt.textContent = r;
    regionSelect.appendChild(opt);
  });

  render();
}

function saveDecisions() {
  localStorage.setItem('colony_qid_decisions', JSON.stringify(decisions));
}

function setDecision(colonyId, decision) {
  if (decisions[colonyId] === decision) {
    delete decisions[colonyId];
  } else {
    decisions[colonyId] = decision;
  }
  saveDecisions();
  render();
}

function getFilteredData() {
  const verdictFilter = document.getElementById('filter-verdict').value;
  const regionFilter = document.getElementById('filter-region').value;
  const decisionFilter = document.getElementById('filter-decision').value;
  const search = document.getElementById('filter-search').value.toLowerCase();

  return data.filter(d => {
    if (verdictFilter === 'needs_review') {
      if (!['confirmed', 'wrong', 'uncertain'].includes(d.verdict)) return false;
    } else if (verdictFilter !== 'all') {
      if (d.verdict !== verdictFilter) return false;
    }
    if (regionFilter !== 'all' && (d.region || 'Unknown') !== regionFilter) return false;
    if (decisionFilter !== 'all') {
      const dec = decisions[d.colony_id];
      if (decisionFilter === 'pending' && dec) return false;
      if (decisionFilter === 'accept' && dec !== 'accept') return false;
      if (decisionFilter === 'reject' && dec !== 'reject') return false;
    }
    if (search && !d.name.toLowerCase().includes(search)) return false;
    return true;
  });
}

function render() {
  const filtered = getFilteredData();
  const container = document.getElementById('cards');

  const needsReview = data.filter(d => ['confirmed', 'wrong', 'uncertain'].includes(d.verdict));
  const accepted = Object.values(decisions).filter(d => d === 'accept').length;
  const rejected = Object.values(decisions).filter(d => d === 'reject').length;
  const pending = needsReview.length - accepted - rejected;

  document.getElementById('stat-total').textContent = `Total: ${data.length}`;
  document.getElementById('stat-showing').textContent = `Showing: ${filtered.length}`;
  document.getElementById('stat-pending').textContent = `Pending: ${pending}`;
  document.getElementById('stat-accepted').textContent = `Accepted: ${accepted}`;
  document.getElementById('stat-rejected').textContent = `Rejected: ${rejected}`;
  document.getElementById('progress-text').textContent =
    `Review progress: ${accepted + rejected} / ${needsReview.length} (${pending} pending)`;

  container.innerHTML = filtered.map(d => renderCard(d)).join('');
}

function renderCard(d) {
  const dec = decisions[d.colony_id] || '';
  const decClass = dec ? `decision-${dec}` : '';
  const qidChanged = d.original_qid !== d.verified_qid;
  const qid = d.verified_qid;
  const wdUrl = qid ? `https://www.wikidata.org/wiki/${qid}` : '#';

  let qidChangeHtml = '';
  if (qidChanged && d.original_qid) {
    qidChangeHtml = `
      <div class="qid-change">
        QID changed: <span class="old">${d.original_qid}</span>
        <span class="arrow">&rarr;</span>
        <span class="new">${d.verified_qid || 'none'}</span>
      </div>`;
  }

  let descHtml = '';
  if (d.wikidata_description) {
    descHtml = `<div class="wd-desc"><strong>Wikidata:</strong> ${d.wikidata_description}</div>`;
  }
  if (d.wikidata_label && d.wikidata_label !== d.name) {
    descHtml = `<div class="wd-desc"><strong>WD Label:</strong> ${d.wikidata_label}</div>` + descHtml;
  }

  const notesHtml = d.notes && d.notes !== 'Human-verified in prior review'
    ? `<div class="notes">${d.notes}</div>` : '';

  const yearsStr = `${d.established_year || '?'} - ${d.independence_year || 'ongoing'}`;

  return `
    <div class="card verdict-${d.verdict} ${decClass}" id="card-${d.colony_id}">
      <div class="card-header" onclick="toggleCard('${d.colony_id}')">
        <div>
          <span class="colony-name">${d.name}</span>
          <span class="colony-meta">&nbsp; ${yearsStr} &nbsp; ${d.region || ''} &nbsp; ${d.colony_type || ''}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          ${dec === 'accept' ? '<span style="color:#27ae60;font-weight:600;">&#10003; Accepted</span>' : ''}
          ${dec === 'reject' ? '<span style="color:#c0392b;font-weight:600;">&#10007; Rejected</span>' : ''}
          <span class="verdict-badge ${d.verdict}">${d.verdict.replace('_', ' ')}</span>
        </div>
      </div>
      <div class="card-body">
        ${qidChangeHtml}
        ${descHtml}
        ${notesHtml}
        <div class="detail-grid">
          <div>
            <div class="detail-label">QID</div>
            <div class="detail-value">${qid ? `<a href="${wdUrl}" target="_blank">${qid}</a>` : 'none'}</div>
          </div>
          <div>
            <div class="detail-label">Colony ID</div>
            <div class="detail-value">${d.colony_id}</div>
          </div>
          <div>
            <div class="detail-label">Dates</div>
            <div class="detail-value">${yearsStr}</div>
          </div>
          <div>
            <div class="detail-label">Source</div>
            <div class="detail-value">${d.source || '-'}</div>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-accept" onclick="event.stopPropagation();setDecision('${d.colony_id}','accept')">
            ${dec === 'accept' ? 'Undo Accept' : 'Accept'}
          </button>
          <button class="btn btn-reject" onclick="event.stopPropagation();setDecision('${d.colony_id}','reject')">
            ${dec === 'reject' ? 'Undo Reject' : 'Reject'}
          </button>
        </div>
      </div>
    </div>`;
}

function toggleCard(colonyId) {
  const card = document.getElementById(`card-${colonyId}`);
  const body = card.querySelector('.card-body');
  if (body.style.maxHeight === '0px') {
    body.style.maxHeight = '';
    body.style.padding = '';
  }
}

function acceptAllVisible() {
  const filtered = getFilteredData();
  filtered.forEach(d => {
    if (!decisions[d.colony_id]) {
      decisions[d.colony_id] = 'accept';
    }
  });
  saveDecisions();
  render();
}

function exportResults() {
  const output = data.map(d => {
    const dec = decisions[d.colony_id];
    let final_verdict;
    if (d.verdict === 'already_verified') {
      final_verdict = 'verified';
    } else if (dec === 'accept') {
      final_verdict = 'verified';
    } else if (dec === 'reject') {
      final_verdict = 'rejected';
    } else {
      final_verdict = 'pending';
    }
    return {
      colony_id: d.colony_id,
      name: d.name,
      region: d.region,
      established_year: d.established_year,
      independence_year: d.independence_year,
      wikidata_qid: d.verified_qid,
      wikidata_label: d.wikidata_label,
      wikidata_description: d.wikidata_description,
      mcp_verdict: d.verdict,
      human_decision: dec || null,
      final_verdict: final_verdict,
      notes: d.notes,
    };
  });

  const blob = new Blob([JSON.stringify(output, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'colony_qid_verified.json';
  a.click();
  URL.revokeObjectURL(url);
}

// Event listeners for filters
['filter-verdict', 'filter-region', 'filter-decision'].forEach(id => {
  document.getElementById(id).addEventListener('change', render);
});
document.getElementById('filter-search').addEventListener('input', render);
