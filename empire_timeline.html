<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>British Empire — Territorial Evolution</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #eee; overflow: hidden; }

#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(10,10,26,0.95); backdrop-filter: blur(8px);
  padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex; justify-content: space-between; align-items: center;
}
#header h1 { font-size: 18px; font-weight: 600; }
.controls { display: flex; gap: 10px; align-items: center; font-size: 13px; }
.controls select, .controls input { background: #1a1a2e; color: #eee; border: 1px solid #333; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
.controls label { color: #999; }
.controls button { background: #2c3e50; color: #eee; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.controls button:hover { background: #3d566e; }

#legend {
  position: fixed; bottom: 10px; left: 20px; z-index: 100;
  background: rgba(10,10,26,0.9); padding: 10px 16px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.1); font-size: 12px;
}
.legend-item { display: inline-flex; align-items: center; margin-right: 14px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }

#tooltip {
  position: fixed; pointer-events: none; z-index: 200;
  background: rgba(20,20,40,0.95); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px; padding: 10px 14px; font-size: 13px;
  max-width: 320px; display: none; backdrop-filter: blur(8px);
}
#tooltip .tt-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
#tooltip .tt-meta { color: #aaa; font-size: 12px; }
#tooltip .tt-type { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; background: rgba(255,255,255,0.1); margin-top: 4px; }
#tooltip .tt-lineage { margin-top: 6px; font-size: 11px; color: #88ccff; }

#info {
  position: fixed; bottom: 10px; right: 20px; z-index: 100;
  color: #666; font-size: 11px;
}

svg { cursor: grab; }
svg:active { cursor: grabbing; }

.timeline-line { stroke: rgba(255,255,255,0.06); stroke-width: 1; }
.timeline-label { fill: rgba(255,255,255,0.25); font-size: 12px; text-anchor: middle; }
.century-band { fill: rgba(255,255,255,0.015); }

/* Edges: hidden by default, shown on hover/click */
.edge { fill: none; stroke-width: 0; opacity: 0; pointer-events: none; }
.edge.visible { stroke-width: 2; opacity: 0.8; }
.edge.visible.partitioned { stroke-dasharray: 6,4; }
.edge-arrow { opacity: 0; }
.edge-arrow.visible { opacity: 0.8; }

.bar { cursor: pointer; rx: 2; ry: 2; opacity: 0.85; }
.bar:hover { opacity: 1; filter: brightness(1.3); }
.bar.postimperial { opacity: 0.45; fill: none !important; stroke-width: 1.5; stroke-dasharray: 4,2; }
.bar.postimperial:hover { opacity: 0.7; filter: brightness(1.3); }
.bar.subdivision { opacity: 0.55; }
.bar.subdivision:hover { opacity: 0.8; }
.bar-label { fill: #ccc; font-size: 9.5px; pointer-events: none; }
.bar-label.postimperial { fill: #888; font-style: italic; }
.bar-label.subdivision { fill: #999; font-size: 8px; }

/* Dimming when lineage selected */
.dimmed .bar { opacity: 0.08; }
.dimmed .bar-label { opacity: 0.05; }
.dimmed .bar.active { opacity: 1; filter: brightness(1.2); }
.dimmed .bar.active.postimperial { opacity: 0.6; }
.dimmed .bar-label.active { opacity: 1; fill: #fff; }
.dimmed .bar-label.active.postimperial { fill: #aaa; }
.dimmed .bar.selected { filter: brightness(1.5); stroke: #fff; stroke-width: 2; }
.dimmed .bar.selected.postimperial { stroke: #fff; stroke-width: 2; }

.event-line { stroke: rgba(255,130,100,0.12); stroke-width: 1; stroke-dasharray: 6,4; }
.event-label { fill: rgba(255,130,100,0.35); font-size: 10px; }
</style>
</head>
<body>

<div id="header">
  <h1>The British Empire — Territorial Evolution 1497–1980</h1>
  <div class="controls">
    <label>Region:
      <select id="filter-region">
        <option value="all">All</option>
      </select>
    </label>
    <label>Search: <input type="text" id="search" placeholder="colony name..."></label>
    <button onclick="resetView()">Reset View</button>
    <button onclick="toggleLabels()">Toggle Labels</button>
  </div>
</div>

<div id="tooltip"></div>
<div id="legend"></div>
<div id="info">Scroll to zoom · Drag to pan · Hover over a colony to see its lineage</div>

<svg id="viz"></svg>

<script>
const REGION_COLORS = {
  'Africa': '#e6a832',
  'Asia': '#e05252',
  'Pacific': '#52b5e0',
  'Caribbean': '#52e0a0',
  'North America': '#b87be0',
  'America': '#9b59b6',
  'Europe': '#e0c552',
  'Antarctica': '#8ecae6',
  'Atlantic': '#4ea8a8',
  'South America': '#2ecc71',
  'Unknown': '#777',
};

const YEAR_MIN = 1490;
const YEAR_MAX = 1985;
const ROW_HEIGHT = 16;
const BAR_HEIGHT = 11;
const MARGIN = { top: 60, right: 40, bottom: 40, left: 40 };

let showLabels = true;
let selectedNode = null;
let allData = null;
let nodeById = {};
let childrenOf = {};
let parentsOf = {};

async function init() {
  allData = EMBED_DATA;

  // Build adjacency from evo edges (for lineage display)
  allData.edges.forEach(e => {
    (childrenOf[e.source] = childrenOf[e.source] || []).push(e.target);
    (parentsOf[e.target] = parentsOf[e.target] || []).push(e.source);
  });
  // Also build adjacency from ALL edges (for hover lineage)
  if (allData.all_edges) {
    allData.all_edges.forEach(e => {
      (childrenOf[e.source] = childrenOf[e.source] || []).push(e.target);
      (parentsOf[e.target] = parentsOf[e.target] || []).push(e.source);
    });
  }

  // Use pre-computed order from Python (clustered by all relationship types)
  const ordered = allData.nodes;
  ordered.forEach((n, i) => { n._row = i; nodeById[n.id] = n; });

  // Region filter
  const regions = [...new Set(allData.nodes.map(n => n.region))].filter(Boolean).sort();
  const sel = document.getElementById('filter-region');
  regions.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = `${r} (${allData.nodes.filter(n => n.region === r).length})`;
    sel.appendChild(opt);
  });

  // Legend
  document.getElementById('legend').innerHTML = regions.map(r =>
    `<span class="legend-item"><span class="legend-dot" style="background:${REGION_COLORS[r] || '#777'}"></span>${r}</span>`
  ).join('') + '<span class="legend-item" style="margin-left:20px"><span class="legend-dot" style="background:none;border:2px dashed #888;width:8px;height:8px"></span><i>Post-Imperial</i></span>' + '<span class="legend-item"><span class="legend-dot" style="background:#888;width:10px;height:6px;border-radius:2px;opacity:0.55"></span><i>Subdivision</i></span>';

  // SVG
  const width = window.innerWidth;
  const svg = d3.select('#viz').attr('width', width).attr('height', window.innerHeight);
  const g = svg.append('g');

  const xScale = d3.scaleLinear()
    .domain([YEAR_MIN, YEAR_MAX])
    .range([MARGIN.left, Math.max(width - MARGIN.right, 2400)]);

  const height = ordered.length * ROW_HEIGHT + MARGIN.top + MARGIN.bottom;

  // Zoom
  const zoom = d3.zoom().scaleExtent([0.2, 10])
    .on('zoom', (event) => g.attr('transform', event.transform));
  svg.call(zoom);

  // Background grid
  const decades = d3.range(1500, 1990, 10);
  const centuries = d3.range(1500, 2000, 100);
  centuries.forEach((c, i) => {
    if (i % 2 === 0) {
      g.append('rect').attr('class', 'century-band')
        .attr('x', xScale(c)).attr('y', 0)
        .attr('width', xScale(c + 100) - xScale(c)).attr('height', height);
    }
  });
  decades.forEach(d => {
    g.append('line').attr('class', 'timeline-line')
      .attr('x1', xScale(d)).attr('x2', xScale(d))
      .attr('y1', MARGIN.top - 20).attr('y2', height);
  });
  centuries.forEach(c => {
    g.append('text').attr('class', 'timeline-label')
      .attr('x', xScale(c)).attr('y', MARGIN.top - 25).text(c);
  });

  // Key events
  const events = [
    { year: 1776, label: 'American Independence' },
    { year: 1834, label: 'Slavery Abolition' },
    { year: 1857, label: 'Indian Rebellion' },
    { year: 1914, label: 'WWI' },
    { year: 1939, label: 'WWII' },
    { year: 1947, label: 'Indian Independence' },
    { year: 1960, label: 'Year of Africa' },
  ];
  events.forEach(ev => {
    g.append('line').attr('class', 'event-line')
      .attr('x1', xScale(ev.year)).attr('x2', xScale(ev.year))
      .attr('y1', MARGIN.top - 15).attr('y2', height);
    g.append('text').attr('class', 'event-label')
      .attr('x', xScale(ev.year) + 3).attr('y', MARGIN.top - 5).text(ev.label);
  });

  // Arrow marker
  svg.append('defs').append('marker')
    .attr('id', 'arrowhead').attr('viewBox', '0 0 10 7')
    .attr('refX', 10).attr('refY', 3.5)
    .attr('markerWidth', 8).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('polygon').attr('points', '0 0, 10 3.5, 0 7')
    .attr('fill', '#fff');

  // Pre-build edge paths (hidden by default)
  const edgeGroup = g.append('g').attr('class', 'edges');
  allData.edges.forEach(e => {
    const src = nodeById[e.source];
    const tgt = nodeById[e.target];
    if (!src || !tgt) return;

    const x1 = xScale(Math.min(src.ind || src.est || YEAR_MIN, YEAR_MAX));
    const y1 = MARGIN.top + src._row * ROW_HEIGHT + BAR_HEIGHT / 2;
    const x2 = xScale(tgt.est || YEAR_MIN);
    const y2 = MARGIN.top + tgt._row * ROW_HEIGHT + BAR_HEIGHT / 2;

    // Step path: horizontal from source end, then vertical, then horizontal to target start
    const midX = x1 + (x2 - x1) * 0.4;
    const path = `M${x1},${y1} L${midX},${y1} L${midX},${y2} L${x2},${y2}`;

    edgeGroup.append('path')
      .attr('class', `edge ${e.type === 'PARTITIONED_INTO' ? 'partitioned' : 'evolved'}`)
      .attr('d', path)
      .attr('data-source', e.source)
      .attr('data-target', e.target)
      .attr('marker-end', 'url(#arrowhead)');
  });

  // Bars
  const barGroup = g.append('g').attr('class', 'bars');
  ordered.forEach(n => {
    const est = n.est || YEAR_MIN;
    const ind = n.ind || 1980;
    const x = xScale(est);
    const w = Math.max(xScale(ind) - xScale(est), 3);
    const y = MARGIN.top + n._row * ROW_HEIGHT;
    const color = REGION_COLORS[n.region] || '#777';

    const pi = n.postimperial;
    const sub = n.subdivision;
    const barH = sub ? BAR_HEIGHT - 4 : BAR_HEIGHT;
    const barY = sub ? y + 2 : y;
    const cls = 'bar' + (pi ? ' postimperial' : '') + (sub ? ' subdivision' : '');
    const bar = barGroup.append('rect')
      .attr('class', cls)
      .attr('x', x).attr('y', barY)
      .attr('width', w).attr('height', barH)
      .attr('data-id', n.id)
      .on('mouseenter', (event) => { showTooltip(event, n); showLineage(n.id); })
      .on('mouseleave', () => { hideTooltip(); if (!selectedNode) clearLineage(); })
      .on('click', (event) => {
        event.stopPropagation();
        if (selectedNode === n.id) { selectedNode = null; clearLineage(); }
        else { selectedNode = n.id; showLineage(n.id, true); }
      });
    if (pi) { bar.attr('stroke', color).attr('fill', 'none'); }
    else { bar.attr('fill', color); }

    barGroup.append('text')
      .attr('class', 'bar-label' + (pi ? ' postimperial' : '') + (sub ? ' subdivision' : ''))
      .attr('x', x - 4).attr('y', barY + barH - 1)
      .attr('text-anchor', 'end')
      .attr('data-id', n.id)
      .text(sub ? n.name + '  ' : n.name);
  });

  // Click background to deselect
  svg.on('click', () => { selectedNode = null; clearLineage(); });

  // Initial zoom
  const contentWidth = xScale(YEAR_MAX) - xScale(YEAR_MIN);
  const contentHeight = ordered.length * ROW_HEIGHT + MARGIN.top + MARGIN.bottom;
  const scaleX = (width - 40) / contentWidth;
  const scaleY = (window.innerHeight - 40) / contentHeight;
  const initialScale = Math.min(scaleX, scaleY, 1);
  svg.call(zoom.transform, d3.zoomIdentity.scale(initialScale).translate(20, 20));

  // Filters
  document.getElementById('filter-region').addEventListener('change', function() {
    const region = this.value;
    ordered.forEach(n => {
      const show = region === 'all' || n.region === region;
      d3.selectAll(`.bar[data-id="${n.id}"]`).attr('opacity', show ? 0.85 : 0.04);
      d3.selectAll(`.bar-label[data-id="${n.id}"]`).attr('opacity', show ? 1 : 0.02);
    });
  });

  document.getElementById('search').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    if (!q) {
      ordered.forEach(n => {
        d3.selectAll(`.bar[data-id="${n.id}"]`).attr('opacity', 0.85);
        d3.selectAll(`.bar-label[data-id="${n.id}"]`).attr('opacity', 1);
      });
      return;
    }
    ordered.forEach(n => {
      const match = n.name.toLowerCase().includes(q);
      d3.selectAll(`.bar[data-id="${n.id}"]`).attr('opacity', match ? 1 : 0.04);
      d3.selectAll(`.bar-label[data-id="${n.id}"]`).attr('opacity', match ? 1 : 0.02);
    });
  });

  window._zoom = zoom;
  window._svg = svg;
  window._initialScale = initialScale;
}

function getLineage(nodeId) {
  const related = new Set();
  const relatedEdges = new Set();
  function findAncestors(id) {
    if (related.has(id)) return;
    related.add(id);
    (parentsOf[id] || []).forEach(pid => { relatedEdges.add(`${pid}|${id}`); findAncestors(pid); });
  }
  function findDescendants(id) {
    (childrenOf[id] || []).forEach(cid => {
      if (!related.has(cid)) { related.add(cid); relatedEdges.add(`${id}|${cid}`); findDescendants(cid); }
    });
  }
  findAncestors(nodeId);
  findDescendants(nodeId);
  related.add(nodeId);
  return { related, relatedEdges };
}

function showLineage(nodeId, pinned) {
  const { related, relatedEdges } = getLineage(nodeId);

  // Dim everything
  d3.select('#viz g').classed('dimmed', true);

  // Activate related bars
  related.forEach(id => {
    d3.selectAll(`.bar[data-id="${id}"]`).classed('active', true);
    d3.selectAll(`.bar-label[data-id="${id}"]`).classed('active', true);
  });
  d3.selectAll(`.bar[data-id="${nodeId}"]`).classed('selected', true);

  // Show related edges with color
  allData.edges.forEach(e => {
    const key = `${e.source}|${e.target}`;
    if (relatedEdges.has(key)) {
      const src = nodeById[e.source];
      const color = REGION_COLORS[src ? src.region : 'Unknown'] || '#777';
      d3.selectAll(`.edge[data-source="${e.source}"][data-target="${e.target}"]`)
        .classed('visible', true)
        .attr('stroke', color);
    }
  });

  // Update arrow color
  const src = nodeById[nodeId];
  const color = REGION_COLORS[src ? src.region : 'Unknown'] || '#fff';
  d3.select('#arrowhead polygon').attr('fill', color);
}

function clearLineage() {
  d3.select('#viz g').classed('dimmed', false);
  d3.selectAll('.bar').classed('active', false).classed('selected', false);
  d3.selectAll('.bar-label').classed('active', false);
  d3.selectAll('.edge').classed('visible', false);
}

function showTooltip(event, n) {
  const tt = document.getElementById('tooltip');
  const years = `${n.est || '?'} – ${n.ind || 'ongoing'}`;

  // Build lineage text
  const ancestors = [];
  const descendants = [];
  (parentsOf[n.id] || []).forEach(pid => {
    const p = nodeById[pid];
    if (p) ancestors.push(p.name);
  });
  (childrenOf[n.id] || []).forEach(cid => {
    const c = nodeById[cid];
    if (c) descendants.push(c.name);
  });

  let lineageHtml = '';
  if (ancestors.length) lineageHtml += `<div class="tt-lineage">← ${ancestors.join(', ')}</div>`;
  if (descendants.length) lineageHtml += `<div class="tt-lineage">→ ${descendants.join(', ')}</div>`;

  tt.innerHTML = `
    <div class="tt-name">${n.name}</div>
    <div class="tt-meta">${years} · ${n.region || 'Unknown'}</div>
    ${n.type ? `<div class="tt-type">${n.type}</div>` : ''}
    ${lineageHtml}
    ${n.qid ? `<div class="tt-meta" style="margin-top:4px">Wikidata: ${n.qid}</div>` : ''}
  `;
  tt.style.display = 'block';
  tt.style.left = Math.min(event.clientX + 15, window.innerWidth - 340) + 'px';
  tt.style.top = (event.clientY - 10) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

function resetView() {
  selectedNode = null;
  clearLineage();
  document.getElementById('filter-region').value = 'all';
  document.getElementById('search').value = '';
  allData.nodes.forEach(n => {
    d3.selectAll(`.bar[data-id="${n.id}"]`).attr('opacity', 0.85);
    d3.selectAll(`.bar-label[data-id="${n.id}"]`).attr('opacity', 1);
  });
  window._svg.call(window._zoom.transform,
    d3.zoomIdentity.scale(window._initialScale).translate(20, 20));
}

function toggleLabels() {
  showLabels = !showLabels;
  d3.selectAll('.bar-label').attr('display', showLabels ? null : 'none');
}
